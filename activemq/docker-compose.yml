version: '3.8'

services:
  activemq:
    image: apache/activemq-classic:6.1.6
    container_name: activemq-broker
    ports:
      - "61616:61616"   # JMS (OpenWire)
      - "8161:8161"     # Web Console
    environment:
      ACTIVEMQ_ADMIN_LOGIN: admin
      ACTIVEMQ_ADMIN_PASSWORD: admin
      ACTIVEMQ_CONNECTION_USER: admin
      ACTIVEMQ_CONNECTION_PASSWORD: admin
    volumes:
      - activemq-data:/opt/apache-activemq/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -u admin:admin -f http://localhost:8161/admin || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  activemq-data:
    driver: local